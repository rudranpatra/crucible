name: Crucible CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -e ".[dev]" || pip install -r crucible/requirements.txt

      - name: Run tests
        working-directory: crucible
        run: pytest tests/ -v --tb=short

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - name: Ruff check
        run: ruff check crucible/ --ignore E501,F401 || true

  crucible-self-check:
    name: Crucible attacks itself
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -r crucible/requirements.txt
      - name: Run Crucible against own workflow
        working-directory: crucible
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.number }}
        run: |
          python runner.py demo
      - name: Post PR comment
        working-directory: crucible
        if: github.event.number != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.number }}
        run: |
          python -c "
          import asyncio, sys
          sys.path.insert(0, '.')
          from runner import CrucibleRunner
          async def main():
              r = CrucibleRunner(verbose=False)
              result = await r.run(demo_mode=True, github_comment=True)
              print(f'Score: {result[\"resilience_score\"]}/100 ({result[\"grade\"]})')
          asyncio.run(main())
          "
